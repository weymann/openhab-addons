# add-on

addon.boschthermotechnology.name = Bosch Thermotechnology Binding
addon.boschthermotechnology.description = Binding for Bosch/Buderus heating systems connected via the Bosch Thermotechnology PointT cloud API (SingleKey ID login).

# thing types

thing-type.boschthermotechnology.account.label = Bosch Thermotechnology Account
thing-type.boschthermotechnology.account.description = Represents one SingleKey ID (Bosch/Buderus) login. After adding this bridge, open the URL shown in the "authUrl" configuration parameter in a browser, log in, then paste the resulting redirect URL into the "pasteAuthorizationRedirectUrl" configuration parameter to complete authorization. See ADR-002 for the full flow.
thing-type.boschthermotechnology.gateway.label = Bosch Thermotechnology Gateway
thing-type.boschthermotechnology.gateway.description = A single Bosch/Buderus heating gateway, reachable via the PointT cloud API.
thing-type.boschthermotechnology.gateway.group.dhw.label = Domestic Hot Water
thing-type.boschthermotechnology.gateway.group.heat-source.label = Heat Source
thing-type.boschthermotechnology.gateway.group.heating-circuit.label = Heating Circuit
thing-type.boschthermotechnology.gateway.group.notifications.label = Notifications
thing-type.boschthermotechnology.gateway.group.system.label = System

# thing types config

thing-type.config.boschthermotechnology.account.authUrl.label = Authorization URL
thing-type.config.boschthermotechnology.account.authUrl.description = Automatically filled in during initialization. Open this URL in a browser and log in with your Bosch/Buderus account. Empty once authorization is complete.
thing-type.config.boschthermotechnology.account.pasteAuthorizationRedirectUrl.label = Authorization Redirect URL
thing-type.config.boschthermotechnology.account.pasteAuthorizationRedirectUrl.description = One-time setup only: paste the full redirect URL from your browser's address bar here after logging in at SingleKey ID. The value is consumed immediately and never stored.
thing-type.config.boschthermotechnology.gateway.gatewayId.label = Gateway ID
thing-type.config.boschthermotechnology.gateway.gatewayId.description = The gateway id assigned by the PointT API. Filled in automatically by discovery.
thing-type.config.boschthermotechnology.gateway.refreshInterval.label = Refresh Interval
thing-type.config.boschthermotechnology.gateway.refreshInterval.description = Interval the gateway's resources are polled, in seconds.

# channel group types

channel-group-type.boschthermotechnology.dhw-group.label = Domestic Hot Water
channel-group-type.boschthermotechnology.heat-source-group.label = Heat Source
channel-group-type.boschthermotechnology.heating-circuit-group.label = Heating Circuit
channel-group-type.boschthermotechnology.notifications-group.label = Notifications
channel-group-type.boschthermotechnology.system-group.label = System

# channel types

channel-type.boschthermotechnology.dhw-charge-duration.label = DHW Charge Duration
channel-type.boschthermotechnology.dhw-charge-duration.description = Domestic hot water single-charge duration of dhw1.
channel-type.boschthermotechnology.dhw-charge.label = DHW Instant Charge
channel-type.boschthermotechnology.dhw-charge.description = Starts or stops a domestic hot water instant charge of dhw1.
channel-type.boschthermotechnology.dhw-operation-mode.label = DHW Operation Mode
channel-type.boschthermotechnology.dhw-operation-mode.description = Domestic hot water operation mode of dhw1. The PointT API itself reports/expects the String values "Off"/"Eco+"/"Eco"/"Comfort"/"Auto" - the numeric codes below are a binding-internal mapping onto those Strings, see GatewayHandler.
channel-type.boschthermotechnology.dhw-operation-mode.state.option.0 = Off
channel-type.boschthermotechnology.dhw-operation-mode.state.option.1 = Eco+
channel-type.boschthermotechnology.dhw-operation-mode.state.option.2 = Eco
channel-type.boschthermotechnology.dhw-operation-mode.state.option.3 = Comfort
channel-type.boschthermotechnology.dhw-operation-mode.state.option.4 = Auto
channel-type.boschthermotechnology.dhw-reduce-temp-on-alarm.label = DHW Reduce Temperature On Alarm
channel-type.boschthermotechnology.dhw-reduce-temp-on-alarm.description = Reduces the domestic hot water temperature when an alarm is active.
channel-type.boschthermotechnology.dhw-single-charge-setpoint.label = DHW Single Charge Setpoint
channel-type.boschthermotechnology.dhw-single-charge-setpoint.description = Domestic hot water single-charge temperature setpoint of dhw1.
channel-type.boschthermotechnology.heat-source-actual-supply-temperature.label = Actual Supply Temperature
channel-type.boschthermotechnology.heat-source-actual-supply-temperature.description = Actual supply (flow) temperature of the heat source.
channel-type.boschthermotechnology.heat-source-ch-status.label = Heat Source CH Status
channel-type.boschthermotechnology.heat-source-ch-status.description = Raw central heating status reported by the heat source. TODO: confirm the exact value shape (boolean, numeric code, or string) against a live gateway - currently passed through as-is.
channel-type.boschthermotechnology.heat-source-number-of-starts.label = Number Of Starts
channel-type.boschthermotechnology.heat-source-number-of-starts.description = Number of times the heat source has started.
channel-type.boschthermotechnology.heat-source-return-temperature.label = Return Temperature
channel-type.boschthermotechnology.heat-source-return-temperature.description = Return temperature of the heat source.
channel-type.boschthermotechnology.heat-source-working-time-total-system.label = Total Working Time
channel-type.boschthermotechnology.heat-source-working-time-total-system.description = Total working time of the heat source. TODO: confirm the reported unit against a live gateway - currently assumed to be hours.
channel-type.boschthermotechnology.manual-room-setpoint.label = Manual Room Setpoint
channel-type.boschthermotechnology.manual-room-setpoint.description = Manual room setpoint of heating circuit hc1.
channel-type.boschthermotechnology.notifications-active.label = Active Notifications
channel-type.boschthermotechnology.notifications-active.description = Raw active notifications/faults reported by the gateway, as a JSON string. TODO: confirm the exact response shape against a live gateway and consider splitting into dedicated channels (e.g. a trigger channel per fault) once known.
channel-type.boschthermotechnology.outdoor-temperature.label = Outdoor Temperature
channel-type.boschthermotechnology.outdoor-temperature.description = Outdoor temperature reported by the gateway (read-only).
