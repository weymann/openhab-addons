# BrightSky Binding — English i18n strings

# Thing type
thing-type.brightsky.weather-location.label = Weather Location
thing-type.brightsky.weather-location.description = Provides current weather observations from the nearest DWD ground station via the BrightSky API.

# Configuration parameters
thing-type.config.brightsky.weather-location.latitude.label = Latitude
thing-type.config.brightsky.weather-location.latitude.description = Geographic latitude (-90 to 90). Required unless a station ID is set.
thing-type.config.brightsky.weather-location.longitude.label = Longitude
thing-type.config.brightsky.weather-location.longitude.description = Geographic longitude (-180 to 180). Required unless a station ID is set.
thing-type.config.brightsky.weather-location.stationId.label = DWD Station ID
thing-type.config.brightsky.weather-location.stationId.description = Optional DWD station ID (e.g. 00433 for Berlin-Tempelhof). Overrides latitude/longitude.
thing-type.config.brightsky.weather-location.refreshInterval.label = Refresh Interval
thing-type.config.brightsky.weather-location.refreshInterval.description = How often to poll for updated observations (minimum 5 minutes).

# Channel group type
channel-group-type.brightsky.current-weather.label = Current Weather
channel-group-type.brightsky.current-weather.description = Live observations from the nearest DWD ground station.

# Channel types
channel-type.brightsky.temperature.label = Temperature
channel-type.brightsky.temperature.description = Air temperature at 2 m above ground.
channel-type.brightsky.dew-point.label = Dew Point
channel-type.brightsky.dew-point.description = Dew point temperature.
channel-type.brightsky.humidity.label = Relative Humidity
channel-type.brightsky.humidity.description = Relative humidity in percent.
channel-type.brightsky.pressure.label = Air Pressure
channel-type.brightsky.pressure.description = Mean sea level pressure.
channel-type.brightsky.wind-speed.label = Wind Speed
channel-type.brightsky.wind-speed.description = Average wind speed over the last 10 minutes.
channel-type.brightsky.wind-direction.label = Wind Direction
channel-type.brightsky.wind-direction.description = Average wind direction over the last 10 minutes.
channel-type.brightsky.wind-gust-speed.label = Wind Gust Speed
channel-type.brightsky.wind-gust-speed.description = Maximum wind gust speed in the last 10 minutes.
channel-type.brightsky.wind-gust-direction.label = Wind Gust Direction
channel-type.brightsky.wind-gust-direction.description = Direction of the strongest wind gust in the last 10 minutes.
channel-type.brightsky.precipitation.label = Precipitation
channel-type.brightsky.precipitation.description = Total precipitation in the last 10 minutes.
channel-type.brightsky.cloud-cover.label = Cloud Cover
channel-type.brightsky.cloud-cover.description = Fraction of the sky covered by clouds.
channel-type.brightsky.visibility.label = Visibility
channel-type.brightsky.visibility.description = Horizontal visibility in metres.
channel-type.brightsky.sunshine.label = Sunshine Duration
channel-type.brightsky.sunshine.description = Total sunshine duration in the last 30 minutes.
channel-type.brightsky.solar.label = Solar Irradiance
channel-type.brightsky.solar.description = Solar energy per square metre in the last 30 minutes.
channel-type.brightsky.condition.label = Condition
channel-type.brightsky.condition.description = Current weather condition reported by the DWD station.
channel-type.brightsky.icon.label = Weather Icon
channel-type.brightsky.icon.description = Icon key representing current conditions.
channel-type.brightsky.observation-time.label = Observation Time
channel-type.brightsky.observation-time.description = Timestamp of the most recent weather observation.

# Condition option labels
channel-type.brightsky.condition.state.option.dry = Dry
channel-type.brightsky.condition.state.option.fog = Fog
channel-type.brightsky.condition.state.option.rain = Rain
channel-type.brightsky.condition.state.option.sleet = Sleet
channel-type.brightsky.condition.state.option.snow = Snow
channel-type.brightsky.condition.state.option.hail = Hail
channel-type.brightsky.condition.state.option.thunderstorm = Thunderstorm
channel-type.brightsky.condition.state.option.null = Unknown
